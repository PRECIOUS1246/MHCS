version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: mhcs-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: mhcs
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - mhcs-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mhcs-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/mhcs?authSource=admin
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      CLIENT_URL: http://localhost:5173
      AI_SERVICE_URL: http://ai-service:8001
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    env_file:
      - .env.local
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:5000/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - mhcs-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: mhcs-ai
    restart: unless-stopped
    ports:
      - '8001:8001'
    environment:
      ENVIRONMENT: ${NODE_ENV:-production}
    healthcheck:
      test: curl -f http://localhost:8001/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - mhcs-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mhcs-client
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - server
    networks:
      - mhcs-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  mhcs-network:
    driver: bridge

